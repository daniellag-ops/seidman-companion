<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seidman-AI · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #0e6b6b;
    --accent-soft: #e4eeee;
    --gold: #c9a84c;
    --bg: #f0f4f4;
    --surface: #fff;
    --border: #cddede;
    --text: #0d1f1f;
    --text-mid: #3d5c5c;
    --text-light: #7a9e9e;
    --radius: 14px;
    --danger: #b94b2b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 40px;
    max-width: 420px;
    width: 100%;
  }

  .logo-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 28px;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 14px; color: white;
  }
  .logo-name { font-family: 'DM Serif Display', serif; font-size: 17px; }
  .logo-sub { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.6px; }

  /* Login steps */
  .step { display: none; }
  .step.active { display: block; }

  .step-indicator {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 20px;
  }
  .step-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); transition: background 0.2s;
  }
  .step-dot.active { background: var(--accent); }
  .step-label { font-size: 11px; color: var(--text-light); }

  .step-title { font-size: 13px; color: var(--text-mid); margin-bottom: 20px; }

  label {
    display: block; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-light); margin-bottom: 7px;
  }

  input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s;
    margin-bottom: 14px; background: white;
  }
  input:focus { border-color: var(--accent); }

  .totp-input {
    font-size: 24px !important;
    letter-spacing: 8px !important;
    text-align: center;
    font-family: 'DM Serif Display', serif !important;
  }

  .btn {
    background: var(--accent);
    color: white; border: none;
    border-radius: 100px;
    padding: 11px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
    width: 100%;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.gold { background: var(--gold); color: var(--text); }
  .btn.secondary {
    background: none; color: var(--accent);
    border: 1.5px solid var(--accent);
    margin-top: 8px;
  }

  .back-link {
    display: inline-block; margin-top: 12px;
    font-size: 12px; color: var(--text-light);
    cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
  }
  .back-link:hover { color: var(--text-mid); }

  .feedback { display: none; margin-top: 12px; padding: 10px 14px; border-radius: 10px; font-size: 13px; }
  .feedback.visible { display: block; }
  .feedback.success { background: var(--accent-soft); color: var(--accent); border-left: 3px solid var(--accent); }
  .feedback.error { background: #fde8e8; color: var(--danger); border-left: 3px solid var(--danger); }

  /* Generate step */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; font-weight: 400;
    margin-bottom: 6px;
  }
  .section-desc {
    font-size: 13px; color: var(--text-mid);
    line-height: 1.5; margin-bottom: 24px;
  }

  .result-box {
    display: none; margin-top: 14px; padding: 14px;
    background: var(--accent-soft); border-radius: 10px;
    border: 1.5px solid var(--accent);
  }
  .result-box.visible { display: block; }
  .result-link-text {
    font-size: 13px; color: var(--text);
    word-break: break-all; margin-bottom: 12px;
    font-weight: 500;
  }

  .signout {
    margin-top: 28px; padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  .signout a {
    font-size: 12px; color: var(--text-light);
    cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
  }
  .signout a:hover { color: var(--text-mid); }
</style>
</head>
<body>

<div class="card">

  <div class="logo-row">
    <div class="avatar">DS</div>
    <div>
      <div class="logo-name">Seidman-AI</div>
      <div class="logo-sub">Admin</div>
    </div>
  </div>

  <!-- Step 1: admin key -->
  <div class="step active" id="step1">
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <span class="step-label">Step 1 of 2</span>
    </div>
    <div class="step-title">Enter your admin password</div>
    <label>Admin key</label>
    <input type="password" id="adminKeyInput" placeholder="Enter admin key" />
    <button class="btn" onclick="submitAdminKey()">Continue →</button>
    <div class="feedback error" id="err1"></div>
  </div>

  <!-- Step 2: TOTP -->
  <div class="step" id="step2">
    <div class="step-indicator">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
      <span class="step-label">Step 2 of 2</span>
    </div>
    <div class="step-title">Enter the 6-digit code from your authenticator app</div>
    <label>Verification code</label>
    <input type="text" inputmode="numeric" pattern="[0-9 ]*" maxlength="7"
           class="totp-input" id="totpInput" placeholder="000 000" autocomplete="one-time-code" />
    <button class="btn" id="totpBtn" onclick="submitTOTP()">Sign in</button>
    <div class="feedback error" id="err2"></div>
    <span class="back-link" onclick="backToStep1()">← Back</span>
  </div>

  <!-- Step 3: Generate link -->
  <div class="step" id="step3">
    <div class="section-title">New patient link</div>
    <div class="section-desc">Generate a unique private link for a patient — copy and send via WhatsApp.</div>
    <label>Patient name</label>
    <input type="text" id="patientName" placeholder="e.g. Sarah Cohen" />
    <button class="btn gold" id="generateBtn" onclick="generateLink()">Generate link</button>
    <div class="feedback error" id="generateError"></div>
    <div class="result-box" id="result">
      <div class="result-link-text" id="resultLink"></div>
      <button class="btn" id="copyLinkBtn" onclick="copyLink()">Copy link</button>
    </div>
    <div class="signout"><a onclick="signOut()">Sign out</a></div>
  </div>

</div>

<script>
let adminKey = '';

function show(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function submitAdminKey() {
  const val = document.getElementById('adminKeyInput').value.trim();
  if (!val) return;
  adminKey = val;
  document.getElementById('err1').classList.remove('visible');
  show('step2');
  setTimeout(() => document.getElementById('totpInput').focus(), 50);
}

function backToStep1() {
  document.getElementById('err2').classList.remove('visible');
  document.getElementById('totpInput').value = '';
  show('step1');
}

async function submitTOTP() {
  const code = document.getElementById('totpInput').value.replace(/\s/g, '');
  if (code.length < 6) return;
  const btn = document.getElementById('totpBtn');
  const errEl = document.getElementById('err2');
  btn.disabled = true; btn.textContent = 'Verifying…';
  errEl.classList.remove('visible');
  try {
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey, totpCode: code })
    });
    if (res.status === 403) {
      const data = await res.json();
      if (data.error === 'Invalid password') {
        errEl.textContent = 'Incorrect admin key.';
        errEl.classList.add('visible');
        backToStep1();
      } else {
        errEl.textContent = 'Invalid code. Please try again.';
        errEl.classList.add('visible');
      }
      return;
    }
    if (!res.ok) throw new Error('Server error');
    show('step3');
    document.getElementById('patientName').focus();
  } catch (err) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

async function generateLink() {
  const name = document.getElementById('patientName').value.trim();
  if (!name) return;
  const btn = document.getElementById('generateBtn');
  const errEl = document.getElementById('generateError');
  btn.disabled = true; btn.textContent = 'Generating…';
  errEl.classList.remove('visible');
  document.getElementById('result').classList.remove('visible');
  try {
    const res = await fetch('/api/generate-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, adminKey })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    document.getElementById('resultLink').textContent = data.link;
    document.getElementById('result').classList.add('visible');
    document.getElementById('copyLinkBtn').textContent = 'Copy link';
    document.getElementById('patientName').value = '';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false; btn.textContent = 'Generate link';
  }
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('resultLink').textContent);
  document.getElementById('copyLinkBtn').textContent = 'Copied!';
  setTimeout(() => document.getElementById('copyLinkBtn').textContent = 'Copy link', 2000);
}

function signOut() {
  adminKey = '';
  document.getElementById('adminKeyInput').value = '';
  document.getElementById('totpInput').value = '';
  document.getElementById('result').classList.remove('visible');
  document.getElementById('patientName').value = '';
  show('step1');
}

document.getElementById('adminKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAdminKey();
});
document.getElementById('totpInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitTOTP();
});
document.getElementById('totpInput').addEventListener('input', e => {
  let val = e.target.value.replace(/\D/g, '').slice(0, 6);
  e.target.value = val.length > 3 ? val.slice(0,3) + ' ' + val.slice(3) : val;
});
</script>
</body>
</html>
