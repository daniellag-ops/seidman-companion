<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A moment from my IVF journey · Melody</title>
<meta property="og:title" content="A moment from my IVF journey · Melody">
<meta property="og:description" content="Shared via Melody — IVF companion by Prof. Daniel Seidman">
<meta property="og:image" content="https://seidman-ai.com/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a1a1a;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 520px;
    width: 100%;
    position: relative;
  }

  .glow-top {
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(14,107,107,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-bot {
    position: absolute;
    bottom: -120px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .inner {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(93,202,165,0.18);
    border-radius: 24px;
    padding: 40px 36px 36px;
    position: relative;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #c9a84c;
  }

  .separator {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(93,202,165,0.2), transparent);
    margin-bottom: 36px;
  }

  .quote-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: rgba(14,107,107,0.3);
    line-height: 0.6;
    margin-bottom: 16px;
    display: block;
  }

  .summary {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    line-height: 1.55;
    color: white;
    margin-bottom: 28px;
  }

  .phase-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #0e6b6b;
    color: rgba(255,255,255,0.9);
    padding: 7px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 40px;
  }

  .separator-bot {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.18), transparent);
    margin-bottom: 28px;
  }

  .cta-row {
    text-align: center;
  }

  .cta-label {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
    letter-spacing: 0.4px;
  }

  .cta-btn {
    display: inline-block;
    padding: 12px 28px;
    background: #c9a84c;
    color: #0a1a1a;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .cta-btn:hover { opacity: 0.85; }

  .date {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    margin-top: 20px;
  }

  .loading { text-align: center; color: rgba(255,255,255,0.3); font-size: 14px; padding: 60px 0; }
  .error-state { text-align: center; color: rgba(255,255,255,0.3); font-size: 14px; padding: 60px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="glow-top"></div>
  <div class="glow-bot"></div>
  <div class="inner" id="content">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

if (!id) {
  document.getElementById('content').innerHTML = '<div class="error-state">Share not found.</div>';
} else {
  fetch(`/api/data?action=get-share&id=${encodeURIComponent(id)}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('content').innerHTML = '<div class="error-state">This moment could not be found.</div>';
        return;
      }

      const logoSvg = `<svg width="36" height="44" viewBox="0 0 28 34" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="25" r="7" fill="#0a1a1a" stroke="#5DCAA5" stroke-width="1.3"/><circle cx="7.5" cy="21.5" r="2.6" fill="#0c3d3d" stroke="#5DCAA5" stroke-width="0.85"/><circle cx="7.5" cy="21.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/><circle cx="7.8" cy="21.2" r="0.32" fill="#c9a84c"/><circle cx="13" cy="23" r="2.6" fill="#0c3d3d" stroke="#5DCAA5" stroke-width="0.85"/><circle cx="13" cy="23" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/><circle cx="13.3" cy="22.7" r="0.32" fill="#c9a84c"/><circle cx="7" cy="27.5" r="2.6" fill="#0c3d3d" stroke="#5DCAA5" stroke-width="0.85"/><circle cx="7" cy="27.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/><circle cx="7.3" cy="27.2" r="0.32" fill="#c9a84c"/><circle cx="12.5" cy="28.5" r="2.6" fill="#0c3d3d" stroke="#5DCAA5" stroke-width="0.85"/><circle cx="12.5" cy="28.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/><circle cx="12.8" cy="28.2" r="0.32" fill="#c9a84c"/><circle cx="10" cy="25" r="0.5" fill="#c9a84c"/><line x1="17" y1="25" x2="17" y2="4" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/><path d="M17,4 C22,5 23.5,10 18,16" stroke="#5DCAA5" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;

      const phaseHtml = data.phase
        ? `<div class="phase-pill">${data.phase}</div>`
        : '';

      document.getElementById('content').innerHTML = `
        <div class="logo-row">
          ${logoSvg}
          <span class="logo-text">melody</span>
        </div>
        <div class="separator"></div>
        <span class="quote-mark">\u201C</span>
        <p class="summary">${escHtml(data.summary)}</p>
        ${phaseHtml}
        <div class="separator-bot"></div>
        <div class="cta-row">
          <div class="cta-label">Your personal IVF companion</div>
          <a class="cta-btn" href="https://seidman-ai.com">seidman-ai.com</a>
        </div>
        <div class="date">${data.date || ''}</div>
      `;
    })
    .catch(() => {
      document.getElementById('content').innerHTML = '<div class="error-state">Something went wrong.</div>';
    });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
