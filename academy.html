<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Embryo Academy · Melody</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Serif+Display&family=Lora:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:   #0e6b6b;
      --gold:   #c9a84c;
      --cream:  #fdfbf7;
      --brown:  #4a3728;
      --brown2: rgba(74,55,40,0.55);
      --border: rgba(74,55,40,0.18);
      --radius: 14px;
    }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────── */
    .acad-header {
      background: var(--teal);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .acad-header-top {
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .acad-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      font-size: 18px;
      line-height: 1;
      transition: background 0.15s;
    }
    .acad-back:hover { background: rgba(255,255,255,0.18); }
    html[dir="rtl"] .acad-back { transform: scaleX(-1); }

    .acad-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .acad-wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: #fff;
      letter-spacing: -0.2px;
      line-height: 1;
    }

    .acad-lang-toggle {
      display: flex;
      gap: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      padding: 4px;
      flex-shrink: 0;
    }
    .acad-lang-btn {
      padding: 5px 13px;
      border-radius: 100px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      color: rgba(255,255,255,0.5);
      background: transparent;
    }
    .acad-lang-btn.active { background: var(--gold); color: #0a1a1a; }

    .acad-doctor-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 20px 13px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .acad-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(201,168,76,0.18);
      border: 1.5px solid rgba(201,168,76,0.35);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 12px; color: var(--gold);
      flex-shrink: 0; letter-spacing: 0.3px;
    }
    .acad-doctor-name {
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.85); line-height: 1.2;
    }
    .acad-doctor-sub {
      font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .acad-main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Simple / Science toggle ──────────────────────────── */
    .acad-mode-wrap {
      display: flex;
      justify-content: center;
      padding: 4px 0 8px;
    }
    .acad-mode-track {
      display: flex;
      background: rgba(74,55,40,0.07);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px;
      gap: 2px;
    }
    .acad-mode-btn {
      padding: 8px 24px;
      border-radius: 100px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      background: transparent;
      color: var(--brown2);
    }
    .acad-mode-btn.active {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 2px 10px rgba(14,107,107,0.22);
    }
    .acad-mode-btn:not(.active):hover {
      color: var(--brown);
      background: rgba(74,55,40,0.06);
    }

    /* ── Section cards ────────────────────────────────────── */
    .acad-section {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .acad-section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      border-bottom: 1.5px solid var(--border);
    }
    .acad-section-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
      color: var(--brown2);
      flex-shrink: 0;
      background: var(--cream);
    }
    .acad-section-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--brown);
      line-height: 1.3;
    }
    .acad-section-body {
      padding: 36px 22px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .acad-empty-hint {
      font-size: 13px;
      color: var(--brown2);
      font-style: italic;
      opacity: 0.6;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .acad-footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--brown2);
      letter-spacing: 0.2px;
      border-top: 1px solid var(--border);
    }
    .acad-footer strong { font-weight: 700; color: var(--brown); }

    /* ── Journey section ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap');

    .journey-body {
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Day pills row */
    .day-pills-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 4px 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .day-pills-scroll::-webkit-scrollbar { display: none; }

    .day-pill {
      flex-shrink: 0;
      scroll-snap-align: start;
      padding: 8px 16px;
      border-radius: 100px;
      border: 2px solid var(--border);
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--brown);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      box-shadow: 2px 2px 0 rgba(74,55,40,0.08);
    }
    .day-pill:hover { border-color: var(--teal); color: var(--teal); }
    .day-pill.active {
      background: var(--brown);
      border-color: var(--brown);
      color: #fff;
      box-shadow: 2px 2px 0 rgba(74,55,40,0.25);
    }

    /* Image nav with arrows */
    .story-img-nav {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .story-nav-arrow {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--brown);
      background: #fff;
      color: var(--brown);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      box-shadow: 2px 2px 0 rgba(74,55,40,0.15);
      flex-shrink: 0;
    }
    .story-nav-arrow:hover { background: var(--brown); color: #fff; }
    .story-nav-arrow:disabled { opacity: 0.3; cursor: default; }
    .story-nav-arrow:disabled:hover { background: #fff; color: var(--brown); }
    .story-img-nav .story-card { flex: 1; min-width: 0; }

    /* Day counter */
    .story-day-counter {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--brown2);
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.5px;
      margin-top: -4px;
    }

    /* Storybook card */
    .story-card {
      border: 2px solid var(--brown);
      border-radius: 28px;
      box-shadow: 5px 5px 0px #9fb8ad;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Image area */
    .story-img-wrap {
      position: relative;
    }
    .story-embryo-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 16px 16px 0 0;
      transition: opacity 0.3s ease;
    }
    .story-embryo-img.fading { opacity: 0; }

    /* Day label pill — positioned top-left */
    .story-day-label {
      position: absolute;
      top: 14px;
      left: 14px;
      background: var(--brown);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 100px;
      letter-spacing: 0.3px;
      z-index: 2;
    }
    html[dir="rtl"] .story-day-label { left: auto; right: 14px; }

    /* Text area */
    .story-text {
      padding: 22px 22px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .story-title-simple {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 20px;
      font-weight: 600;
      color: var(--brown);
      line-height: 1.3;
    }
    .story-title-science {
      font-family: 'Nunito', sans-serif;
      font-style: normal;
      font-size: 18px;
      font-weight: 800;
      color: var(--teal);
      line-height: 1.3;
    }

    .story-desc {
      font-size: 14px;
      color: var(--brown2);
      line-height: 1.7;
    }
    .story-desc-simple { font-family: 'Lora', Georgia, serif; }
    .story-desc-science { font-family: 'Nunito', sans-serif; }

    /* Fact box */
    .story-fact {
      margin: 14px 22px 22px;
      background: #ffdfd3;
      border-radius: 14px;
      padding: 13px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .story-fact-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .story-fact-text {
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: #7a3a2a;
      line-height: 1.5;
    }

  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="acad-header">
    <div class="acad-header-top">

      <a class="acad-back" href="/" aria-label="Back to Melody">&#8592;</a>

      <div class="acad-logo">
        <svg width="22" height="27" viewBox="0 0 28 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="25" r="7" fill="#0e6b6b" stroke="rgba(255,255,255,0.7)" stroke-width="1.3"/>
          <circle cx="7.5" cy="21.5" r="2.6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="0.85"/>
          <circle cx="7.5" cy="21.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/>
          <circle cx="7.8" cy="21.2" r="0.32" fill="#c9a84c"/>
          <circle cx="13" cy="23" r="2.6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="0.85"/>
          <circle cx="13" cy="23" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/>
          <circle cx="13.3" cy="22.7" r="0.32" fill="#c9a84c"/>
          <circle cx="7" cy="27.5" r="2.6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="0.85"/>
          <circle cx="7" cy="27.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/>
          <circle cx="7.3" cy="27.2" r="0.32" fill="#c9a84c"/>
          <circle cx="12.5" cy="28.5" r="2.6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="0.85"/>
          <circle cx="12.5" cy="28.5" r="1.05" stroke="#c9a84c" stroke-width="0.55" fill="none"/>
          <circle cx="12.8" cy="28.2" r="0.32" fill="#c9a84c"/>
          <circle cx="10" cy="25" r="0.5" fill="#c9a84c"/>
          <line x1="17" y1="25" x2="17" y2="4" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M17,4 C22,5 23.5,10 18,16" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span class="acad-wordmark">melody</span>
      </div>

      <div class="acad-lang-toggle">
        <button class="acad-lang-btn" onclick="setLang('en')">EN</button>
        <button class="acad-lang-btn active" onclick="setLang('he')">&#1506;&#1489;</button>
      </div>

    </div>

    <div class="acad-doctor-row">
      <div class="acad-avatar">DS</div>
      <div>
        <div class="acad-doctor-name">Prof. Daniel Seidman</div>
        <div class="acad-doctor-sub">ALMA Clinic &middot; Reproductive Medicine</div>
      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="acad-main">

    <!-- Simple / Science toggle -->
    <div class="acad-mode-wrap">
      <div class="acad-mode-track" role="group">
        <button class="acad-mode-btn active" id="modeSimple"  onclick="setMode('simple')" >Simple</button>
        <button class="acad-mode-btn"        id="modeScience" onclick="setMode('science')">Science</button>
      </div>
    </div>

    <!-- Section 1 -->
    <section class="acad-section" id="sectionJourney">
      <div class="acad-section-header">
        <div class="acad-section-num">1</div>
        <h2 class="acad-section-title" id="titleJourney">The development journey</h2>
      </div>
      <div class="journey-body">

        <!-- Day pills -->
        <div class="day-pills-scroll" id="dayPillsRow" role="group" aria-label="Select day"></div>

        <!-- Day counter -->
        <div class="story-day-counter" id="storyCounter">1 / 8</div>

        <!-- Storybook card + arrows -->
        <div class="story-img-nav">
          <button class="story-nav-arrow" id="arrowPrev" aria-label="Previous day">&#8592;</button>
          <div class="story-card">
            <div class="story-img-wrap">
              <img class="story-embryo-img" id="storyImg" src="/embryo-oocyte.png" alt="" />
            </div>
          <div class="story-text">
            <h3 class="story-title-simple" id="storyTitle">The Start of Us</h3>
            <p  class="story-desc story-desc-simple" id="storyDesc">Imagine a tiny seed, perfectly whole.</p>
          </div>
          <div class="story-fact">
            <span class="story-fact-icon">💡</span>
            <span class="story-fact-text" id="storyFact"></span>
          </div>
          </div><!-- /story-card -->
          <button class="story-nav-arrow" id="arrowNext" aria-label="Next day">&#8594;</button>
        </div><!-- /story-img-nav -->

      </div>
    </section>

    <!-- Section 2 -->
    <section class="acad-section" id="sectionEggs">
      <div class="acad-section-header">
        <div class="acad-section-num">2</div>
        <h2 class="acad-section-title" id="titleEggs">Where did my eggs go?</h2>
      </div>
      <div class="acad-section-body">
        <p class="acad-empty-hint">Content coming soon</p>
      </div>
    </section>

    <!-- Section 3 -->
    <section class="acad-section" id="sectionGrade">
      <div class="acad-section-header">
        <div class="acad-section-num">3</div>
        <h2 class="acad-section-title" id="titleGrade">What does my grade mean?</h2>
      </div>
      <div class="acad-section-body">
        <p class="acad-empty-hint">Content coming soon</p>
      </div>
    </section>

  </main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="acad-footer">
    <strong>Embryo Academy</strong> &middot; Powered by Melody
  </footer>

  <script>
    // ── i18n ─────────────────────────────────────────────────
    let currentLang = 'he';

    const STRINGS = {
      en: {
        titleJourney: 'The development journey',
        titleEggs:    'Where did my eggs go?',
        titleGrade:   'What does my grade mean?',
        modeSimple:   'Simple',
        modeScience:  'Science',
      },
      he: {
        titleJourney: '\u05de\u05e1\u05e2 \u05d4\u05d4\u05ea\u05e4\u05ea\u05d7\u05d5\u05ea',
        titleEggs:    '\u05dc\u05d0\u05df \u05d4\u05dc\u05db\u05d5 \u05d4\u05d1\u05d9\u05e6\u05d9\u05d5\u05ea \u05e9\u05dc\u05d9?',
        titleGrade:   '\u05de\u05d4 \u05d4\u05de\u05e9\u05de\u05e2\u05d5\u05ea \u05e9\u05dc \u05d4\u05e6\u05d9\u05d5\u05df \u05e9\u05dc\u05d9?',
        modeSimple:   '\u05e4\u05e9\u05d5\u05d8',
        modeScience:  '\u05de\u05d3\u05e2\u05d9',
      }
    };

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir  = lang === 'he' ? 'rtl' : 'ltr';
      document.querySelectorAll('.acad-lang-btn').forEach(b =>
        b.classList.toggle('active',
          (lang === 'he' && b.textContent.trim() === '\u05e2\u05d1') ||
          (lang === 'en' && b.textContent.trim() === 'EN')
        )
      );
      applyStrings();
    }

    function applyStrings() {
      const s = STRINGS[currentLang] || STRINGS.en;
      Object.keys(s).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = s[id];
      });
      if (typeof refreshJourneyLang === 'function') refreshJourneyLang();
    }

    // ── Mode toggle ──────────────────────────────────────────
    let currentMode = 'simple';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('modeSimple').classList.toggle('active',  mode === 'simple');
      document.getElementById('modeScience').classList.toggle('active', mode === 'science');
      selectDay(currentDay, false);
    }

    // ── Journey timeline data ─────────────────────────────────
    const DAYS = [
      {
        pill: { en: 'Day 1',         he: 'יום 1'          },
        label:{ en: 'Day 1',         he: 'יום 1'          },
        img: '/embryo-oocyte.png',
        simple: {
          en: { title: 'The Start of Us',
                desc:  'Imagine a tiny seed, perfectly whole. Today, the instructions from egg and sperm have met and fused — quietly, invisibly, inside the lab.' },
          he: { title: 'הראשית שלנו',
                desc:  'דמייני זרע קטן, שלם לחלוטין. היום, ההוראות מהביצית ומהזרע נפגשו והתמזגו — בשקט, בלתי נראה, בתוך המעבדה.' }
        },
        science: {
          en: { title: '2PN Zygote',
                desc:  'Bipronuclear zygote confirming successful syngamy. Two pronuclei visible 16–18 hours post-insemination, confirming normal fertilization.' },
          he: { title: 'זיגוטה 2PN',
                desc:  'זיגוטה דו-פרונוקלאית המאשרת סינגמיה תקינה. שני פרונוקלאים גלויים 16–18 שעות לאחר ההזרעה, המאשרים הפרייה תקינה.' }
        },
        fact: {
          en: 'Two pronuclei (2PN) confirm exactly one sperm fertilized the egg. Abnormal fertilization (1PN or 3PN) means the embryo won't be used.',
          he: 'שני פרונוקלאים (2PN) מאשרים שזרע אחד בדיוק הפרה את הביצית. הפרייה לא תקינה (1PN או 3PN) אינה מאפשרת שימוש בעובר.'
        }
      },
      {
        pill: { en: 'Day 2 · 2-cell', he: 'יום 2 · 2 תאים' },
        label:{ en: 'Day 2',          he: 'יום 2'           },
        img: '/embryo-2pn.png',
        simple: {
          en: { title: 'First Steps',
                desc:  'The seed has split — now there are two. Small and equal, holding the same promise. It is still barely visible to the naked eye, but something has begun.' },
          he: { title: 'צעדים ראשונים',
                desc:  'הזרע התפצל — עכשיו ישנם שניים. קטנים ושווים, ובכל זאת מחזיקים את אותה הבטחה. עדיין בקושי נראה לעין, אבל משהו כבר התחיל.' }
        },
        science: {
          en: { title: '2-Cell Embryo',

    // ── Journey timeline logic ────────────────────────────────
    let currentDay = 0;

    function buildDayPills() {
      const row = document.getElementById('dayPillsRow');
      if (!row) return;
      row.innerHTML = '';
      DAYS.forEach((d, i) => {
        const btn = document.createElement('button');
        btn.className = 'day-pill' + (i === 0 ? ' active' : '');
        btn.textContent = d.pill[currentLang] || d.pill.en;
        btn.dataset.idx = i;
        btn.onclick = () => selectDay(i, true);
        row.appendChild(btn);
      });
    }

    function selectDay(idx, animate) {
      currentDay = idx;
      const d = DAYS[idx];
      if (!d) return;

      // Update pill active state + scroll into view
      document.querySelectorAll('.day-pill').forEach(p => {
        const active = parseInt(p.dataset.idx) === idx;
        p.classList.toggle('active', active);
        if (active) p.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });

      // Counter
      const counter = document.getElementById('storyCounter');
      if (counter) counter.textContent = (idx + 1) + ' / ' + DAYS.length;

      // Arrow states
      const prev = document.getElementById('arrowPrev');
      const next = document.getElementById('arrowNext');
      if (prev) prev.disabled = idx === 0;
      if (next) next.disabled = idx === DAYS.length - 1;

      // Update day label
      const lbl = document.getElementById('storyDayLabel');
      if (lbl) lbl.textContent = d.label[currentLang] || d.label.en;



      // Image cross-fade
      const imgEl = document.getElementById('storyImg');
      if (imgEl && d.img) {
        if (animate && imgEl.getAttribute('src') !== d.img) {
          imgEl.classList.add('fading');
          setTimeout(() => { imgEl.src = d.img; imgEl.classList.remove('fading'); }, 280);
        } else {
          imgEl.src = d.img;
          imgEl.classList.remove('fading');
        }
      }

      // Title & desc
      const mode = currentMode;
      const content = (mode === 'science' ? d.science : d.simple)[currentLang]
                   || (mode === 'science' ? d.science : d.simple).en;

      const titleEl = document.getElementById('storyTitle');
      if (titleEl) {
        titleEl.textContent = content.title;
        titleEl.className = mode === 'science' ? 'story-title-science' : 'story-title-simple';
      }

      const descEl = document.getElementById('storyDesc');
      if (descEl) {
        descEl.textContent = content.desc;
        descEl.className = 'story-desc ' + (mode === 'science' ? 'story-desc-science' : 'story-desc-simple');
      }

      const factEl = document.getElementById('storyFact');
      if (factEl) factEl.textContent = d.fact[currentLang] || d.fact.en;
    }

    function prevDay() {
      console.log('[Academy] prevDay called, currentDay=', currentDay);
      if (currentDay > 0) selectDay(currentDay - 1, true);
      else console.log('[Academy] already at first day');
    }
    function nextDay() {
      console.log('[Academy] nextDay called, currentDay=', currentDay);
      if (currentDay < DAYS.length - 1) selectDay(currentDay + 1, true);
      else console.log('[Academy] already at last day');
    }

    function refreshJourneyLang() {
      // Rebuild pills with current language
      document.querySelectorAll('.day-pill').forEach((btn, i) => {
        btn.textContent = DAYS[i]?.pill[currentLang] || DAYS[i]?.pill.en || '';
      });
      // Re-render current day
      selectDay(currentDay, false);
    }

    // ── Init ─────────────────────────────────────────────────
    setLang('he');
    buildDayPills();
    selectDay(0, false);

    // Wire arrow buttons
    document.getElementById('arrowPrev').addEventListener('click', prevDay);
    document.getElementById('arrowNext').addEventListener('click', nextDay);
    console.log('[Academy] init complete, DAYS.length=', DAYS.length);
  </script>
